{% extends "auth_base.html" %}
{% block title %}Entrar{% endblock %}
{% block content %}
<h2>Entrar</h2>
<form method="post" action="/login" class="stack">
  <input type="hidden" name="next" value="{{ next }}">
  <div class="input-group">
    <label class="label" for="email">E-mail</label>
    <input class="input" id="email" type="email" name="email" required autocomplete="email" autofocus>
  </div>
  <div class="input-group">
    <label class="label" for="password">Senha</label>
    <input class="input" id="password" type="password" name="password" required autocomplete="current-password">
  </div>
  <button type="submit">Entrar</button>
</form>
<p><a href="/forgot">Esqueci a senha</a></p>
<p>Não tem conta? <a href="/signup{% if next %}?next={{ next }}{% endif %}">Cadastre-se</a></p>
{% endblock %}
