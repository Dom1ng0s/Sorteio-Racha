{% extends "auth_base.html" %}
{% block title %}Redefinir senha{% endblock %}
{% block content %}
<h2>Redefinir senha</h2>
{% if enviado %}
  <p>Se houver uma conta com esse e-mail, enviamos um link para redefinir a senha.</p>
  <p><a href="/login">Voltar</a></p>
{% else %}
  <form method="post" action="/forgot" class="stack">
    <div class="input-group">
      <label class="label" for="email">E-mail</label>
      <input class="input" id="email" type="email" name="email" required autocomplete="email" autofocus>
    </div>
    <button type="submit">Enviar link</button>
  </form>
  <p><a href="/login">Voltar</a></p>
{% endif %}
{% endblock %}
