{% extends "auth_base.html" %}
{% block title %}Nova senha{% endblock %}
{% block content %}
<h2>Nova senha</h2>
{% if invalido %}
  <p class="erro">Link inválido ou expirado.</p>
  <p><a href="/forgot">Pedir outro</a></p>
{% else %}
  <form method="post" action="/reset/{{ token }}" class="stack">
    <div class="input-group">
      <label class="label" for="password">Nova senha (mín. 8)</label>
      <input class="input" id="password" type="password" name="password" required minlength="8" autocomplete="new-password" autofocus>
    </div>
    <button type="submit">Salvar senha</button>
  </form>
{% endif %}
{% endblock %}
